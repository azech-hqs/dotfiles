[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "check-added-large-files", args = ["--maxkb=1500"] },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
]

[[repos]]
repo = "https://github.com/JohnnyMorganz/StyLua"
rev = "v2.1.0"
hooks = [
  { id = "stylua" }
]
